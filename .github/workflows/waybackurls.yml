name: Waybackurls

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'live.txt'

jobs:
  waybackurls-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install waybackurls
        run: |
          go install -v github.com/tomnomnom/waybackurls@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          waybackurls -h | head -1

      - name: Run waybackurls
        run: |
          if [ ! -f live.txt ]; then
            echo "❌ live.txt not found!"
            exit 1
          fi
          
          echo "=== Starting waybackurls ==="
          echo "Total hosts in live.txt: $(wc -l < live.txt)"
          
          cat live.txt | waybackurls > WB1.txt
          
          echo "=== waybackurls completed ==="
          echo "Total URLs found: $(wc -l < WB1.txt)"
          echo "=== Results ==="
          cat WB1.txt

      - name: Send Results to Discord
        if: success()
        run: |
          HOSTS=$(wc -l < live.txt)
          URLS=$(wc -l < WB1.txt)
          
          curl -X POST \
            -H "Content-Type: multipart/form-data" \
            -F "file=@WB1.txt" \
            -F "payload_json={
              \"username\": \"Wayback Bot\",
              \"embeds\": [{
                \"title\": \"🕒 Waybackurls Results\",
                \"color\": 3447003,
                \"fields\": [
                  {\"name\": \"📥 Input Hosts\", \"value\": \"${HOSTS}\", \"inline\": true},
                  {\"name\": \"🔗 URLs Found\", \"value\": \"${URLS}\", \"inline\": true},
                  {\"name\": \"📎 File\", \"value\": \"WB1.txt\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"waybackurls • $(date -u +\"%Y-%m-%d %H:%M UTC\")\"}
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waybackurls-results
          path: WB1.txt
