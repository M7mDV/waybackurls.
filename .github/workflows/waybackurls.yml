name: Waybackurls

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'live.txt'

jobs:
  waybackurls-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install waybackurls
        run: |
          go install -v github.com/tomnomnom/waybackurls@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run waybackurls
        run: |
          if [ ! -f live.txt ]; then
            echo "❌ live.txt not found!"
            exit 1
          fi
          
          echo "=== Starting waybackurls ==="
          echo "Total hosts in live.txt: $(wc -l < live.txt)"
          
          cat live.txt | waybackurls > WB1.txt
          
          echo "=== waybackurls completed ==="
          echo "Total URLs found: $(wc -l < WB1.txt)"
          echo "=== Results (first 20 lines) ==="
          head -20 WB1.txt

      - name: Compress Results
        if: success()
        run: |
          # ضغط الملف لو كبير
          gzip -c WB1.txt > WB1.txt.gz
          ls -lh WB1.txt WB1.txt.gz

      - name: Send Results to Discord
        if: success()
        run: |
          HOSTS=$(wc -l < live.txt)
          URLS=$(wc -l < WB1.txt)
          SIZE=$(du -h WB1.txt | cut -f1)
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          
          # لو الملف أقل من 8MB, ابعته مباشرة
          FILE_SIZE=$(stat -c%s WB1.txt)
          MAX_SIZE=8388608  # 8MB Discord limit
          
          if [ "$FILE_SIZE" -lt "$MAX_SIZE" ]; then
            echo "Sending file directly ($SIZE)..."
            curl -X POST \
              -H "Content-Type: multipart/form-data" \
              -F "file=@WB1.txt" \
              -F "payload_json={\"username\":\"Wayback Bot\",\"embeds\":[{\"title\":\"🕒 Waybackurls Results\",\"color\":3447003,\"fields\":[{\"name\":\"📥 Input Hosts\",\"value\":\"${HOSTS}\",\"inline\":true},{\"name\":\"🔗 URLs Found\",\"value\":\"${URLS}\",\"inline\":true},{\"name\":\"📦 Size\",\"value\":\"${SIZE}\",\"inline\":true}],\"footer\":{\"text\":\"waybackurls • ${NOW}\"}}]}" \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          else
            echo "File too big ($SIZE), sending summary only..."
            # ابعث summary بس + رابط الـ artifact
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"Wayback Bot\",\"embeds\":[{\"title\":\"🕒 Waybackurls Results\",\"description\":\"⚠️ File too large to send directly!\\n\\n📥 Input Hosts: **${HOSTS}**\\n🔗 URLs Found: **${URLS}**\\n📦 Size: **${SIZE}**\\n\\n⬇️ Download from artifact below\",\"color\":15158332,\"footer\":{\"text\":\"waybackurls • ${NOW}\"}}]}" \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waybackurls-results
          path: |
            WB1.txt
            WB1.txt.gz
